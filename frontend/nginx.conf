# SQLBot 前端 Nginx 配置（envsubst 模板）
#
# ${CONTEXT_PATH} 由官方 nginx 镜像在启动时用环境变量替换（默认空串）。
# 其余以 $ 开头的均为 nginx 内置变量（$host/$uri/...），envsubst 不会误伤。
#
# 跨域说明：本配置同源托管前端 + 反代 API，浏览器同源不触发 CORS。
# 跨域/iframe 嵌入场景由【后端 CORSMiddleware】按 BACKEND_CORS_ORIGINS 处理，
# Nginx 只负责透传请求与 X-Forwarded-* 头，不重复加 CORS 头（避免重复头）。

# --- 上游：服务名对应 docker-compose 中的 service 名 ---
upstream sqlbot_backend { server backend:8000; }
upstream sqlbot_mcp     { server mcp:8001;     }

server {
    listen       80;
    server_name  _;

    # Excel/文件上传需要较大 body
    client_max_body_size 100m;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml
        image/svg+xml;

    # ---------- 后端 API（含 SSE 流式问答/分析） ----------
    location ${CONTEXT_PATH}/api/ {
        proxy_pass http://sqlbot_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE / 长连接流式响应：禁用缓冲、拉长超时
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Swagger 文档 ----------
    location = ${CONTEXT_PATH}/docs {
        proxy_pass http://sqlbot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = ${CONTEXT_PATH}/openapi.json {
        proxy_pass http://sqlbot_backend;
        proxy_set_header Host $host;
    }
    # Swagger UI 静态资源（swagger-ui-bundle.js / swagger-ui.css 等）
    location /swagger-ui- {
        proxy_pass http://sqlbot_backend;
        proxy_set_header Host $host;
    }

    # ---------- xpack 动态脚本资源 ----------
    location /xpack_static/ {
        proxy_pass http://sqlbot_backend;
        proxy_set_header Host $host;
    }

    # ---------- 图表图片（由 MCP 服务在 /images 静态提供） ----------
    location /images/ {
        proxy_pass http://sqlbot_mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 带哈希的静态资源：强缓存 ----------
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------- SPA 入口（Vue Router hash 模式兜底） ----------
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
